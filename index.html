<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RUN TOWARD 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    height:100%;
    background:#ffffff;
    display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
    -webkit-user-select:none; user-select:none;
    touch-action:manipulation;
  }
  #stage {
    position:relative;
    width:66.66vw;
    max-width:1100px;
    background:#ffffff;
    image-rendering:pixelated;
  }
  canvas { display:block; width:100%; image-rendering:pixelated; background:#ffffff; }

  /* Retry button: pixel style, red, restart icon */
  #retryBtn {
    position:absolute;
    left:50%;
    top:calc(60% - 15px);
    transform:translate(-50%, 0);
    width:51px; height:42px;
    background:#E0312B;
    border:none;
    cursor:pointer;
    display:none;
    align-items:center; justify-content:center;
    /* pixel-notched corners like reference image */
    clip-path: polygon(
      0 6px, 3px 6px, 3px 3px, 6px 3px, 6px 0,
      calc(100% - 6px) 0, calc(100% - 6px) 3px, calc(100% - 3px) 3px, calc(100% - 3px) 6px, 100% 6px,
      100% calc(100% - 6px), calc(100% - 3px) calc(100% - 6px), calc(100% - 3px) calc(100% - 3px), calc(100% - 6px) calc(100% - 3px), calc(100% - 6px) 100%,
      6px 100%, 6px calc(100% - 3px), 3px calc(100% - 3px), 3px calc(100% - 6px), 0 calc(100% - 6px)
    );
    transition: transform 0.08s steps(2);
  }
  #retryBtn:hover { transform:translate(-50%, -2px); }   /* +y (up) 2px on hover */
  #retryBtn:active { transform:translate(-50%, 0); }
  #retryBtn svg { width:27px; height:27px; display:block; }

  /* Mobile: ground fills full width, no side margins */
  @media (max-width: 768px), (pointer: coarse) and (max-width: 1024px) {
    #stage { width:100vw; max-width:none; }
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game" width="900" height="300"></canvas>
  <button id="retryBtn" aria-label="retry">
    <svg viewBox="0 0 14 14" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg" fill="#ffffff">
      <!-- loop: left / bottom / right bars -->
      <rect x="2" y="3" width="2" height="8"/>
      <rect x="2" y="9" width="10" height="2"/>
      <rect x="10" y="6" width="2" height="5"/>
      <!-- top bar up to arrow -->
      <rect x="2" y="3" width="6" height="2"/>
      <!-- arrow head pointing right -->
      <rect x="8" y="1" width="1" height="1"/>
      <rect x="8" y="2" width="2" height="1"/>
      <rect x="8" y="3" width="3" height="1"/>
      <rect x="8" y="4" width="2" height="1"/>
      <rect x="8" y="5" width="1" height="1"/>
    </svg>
  </button>
</div>

};


// ---------- Config ----------
const CW = 900, CH = 300;
const GROUND_OVERLAP = 10;
const START_SPEED = 6.5;
const MAX_SPEED = 13.5;
const SPEED_INC = 0.0011;
const GRAVITY = 0.62;
const CLEAR_SCORE = 2026;

const HORSE_H = 70;
function wOf(asset, h){ return asset.w * (h/asset.h); }

const FIRE_H = 56;
const FIRE_W = wOf(ASSETS.FIRE, FIRE_H);

const GROUND_H = 30;
const GROUND_W = wOf(ASSETS.GROUND, GROUND_H);

const GROUND_TOP = CH - GROUND_H - 18;
const FEET_Y = GROUND_TOP + GROUND_OVERLAP;

const JUMP_PEAK = FIRE_H * 2;
const JUMP_V = Math.sqrt(2 * GRAVITY * JUMP_PEAK);
const JUMP_AIRTIME = 2 * JUMP_V / GRAVITY;

// ---------- Load images ----------
const IMG = {};
let loaded = 0; const totalImgs = Object.keys(ASSETS).length;
for (const k in ASSETS){
  const im = new Image();
  im.onload = ()=>{ loaded++; };
  im.src = ASSETS[k].src;
  IMG[k] = im;
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const retryBtn = document.getElementById('retryBtn');

// ---------- Sequences ----------
const RUN_SEQ = ['RUN_1','RUN_2'];
const RUN_FRAME_MS = 300;
const FLY_SEQ = ['FLY_1','FLY_2','FLY_1','FLY_2'];

// ---------- Score system ----------
let cleared = localStorage.getItem('run2026_cleared') === '1';
let totalScore = +(localStorage.getItem('run2026_total') || 0);
let best = +(localStorage.getItem('run2026_best') || 0);

let speed, score, gameOver, gameClear, started;
let horse, obstacles, spawnTimer, groundX;
let lastTime = 0, runAccum = 0;

function reset(){
  speed = START_SPEED;
  score = 0;
  gameOver = false;
  gameClear = false;
  started = false;
  groundX = 0;
  spawnTimer = 60;
  obstacles = [];
  runAccum = 0;
  horse = { x: 80, y: 0, vy: 0, onGround: true, runIdx: 0 };
  retryBtn.style.display = 'none';
}
reset();

// ---------- Input ----------
function jump(){
  if (gameOver || gameClear) return;      // restart only via retry button
  if (!started){ started = true; }
  if (horse.onGround){ horse.vy = JUMP_V; horse.onGround = false; }
}
window.addEventListener('keydown', e=>{
  if (e.code==='Space' || e.code==='ArrowUp'){ e.preventDefault(); jump(); }
});
const stage = document.getElementById('stage');
stage.addEventListener('touchstart', e=>{
  if (e.target === retryBtn || retryBtn.contains(e.target)) return;
  e.preventDefault(); jump();
}, {passive:false});
stage.addEventListener('mousedown', e=>{
  if (e.target === retryBtn || retryBtn.contains(e.target)) return;
  e.preventDefault(); jump();
});

// Retry button: press to restart
function restart(){ reset(); started = true; }
retryBtn.addEventListener('click', e=>{ e.stopPropagation(); restart(); });
retryBtn.addEventListener('touchstart', e=>{ e.stopPropagation(); }, {passive:true});

// ---------- Spawn ----------
function spawnObstacle(){
  const flying = Math.random() < 0.3 && score > 180;
  if (flying){
    const h = 46;
    const w = wOf(ASSETS.FLY_1, h);
    const heights = [FEET_Y - h - 36, FEET_Y - h - 70];
    const fy = heights[Math.floor(Math.random()*heights.length)];
    obstacles.push({ type:'fly', x:CW+30, y:fy, w, h, anim:0, animAccum:0 });
  } else {
    const count = Math.random() < 0.45 ? 2 : 1;
    const gap = 4;
    const totalW = count*FIRE_W + (count-1)*gap;
    obstacles.push({ type:'fire', x:CW+30, y:FEET_Y - FIRE_H, count, gap, totalW });
  }
}
function nextSpawnDelay(){
  const speedT = (speed - START_SPEED) / (MAX_SPEED - START_SPEED);
  const minGap = JUMP_AIRTIME + 12 - speedT * 4;
  const r = Math.random();
  if (r < 0.32)  return minGap + Math.random()*10;
  if (r < 0.78)  return minGap + 18 + Math.random()*35;
  return minGap + 55 + Math.random()*55;
}

// ---------- Update -----------
function update(dt){
  if (!started) return;

  speed = Math.min(MAX_SPEED, speed + SPEED_INC*(dt/16.67));
  score += speed * 0.02 * (dt/16.67);

  if (!cleared && totalScore + score >= CLEAR_SCORE){
    gameClear = true;
    cleared = true;
    totalScore = 0;
    localStorage.setItem('run2026_cleared','1');
    localStorage.setItem('run2026_total','0');
    retryBtn.style.display = 'flex';
    return;
  }

  groundX -= speed;
  if (groundX <= -GROUND_W) groundX += GROUND_W;

  if (!horse.onGround){
    horse.vy -= GRAVITY*(dt/16.67);
    horse.y += horse.vy*(dt/16.67);
    if (horse.y <= 0){ horse.y = 0; horse.vy = 0; horse.onGround = true; }
  }

  runAccum += dt;
  if (runAccum >= RUN_FRAME_MS){ runAccum -= RUN_FRAME_MS; horse.runIdx = (horse.runIdx+1)%RUN_SEQ.length; }

  spawnTimer -= dt/16.67;
  if (spawnTimer <= 0){
    spawnObstacle();
    spawnTimer = nextSpawnDelay();
  }

  for (const o of obstacles){
    o.x -= speed;
    if (o.type==='fly'){
      o.animAccum += dt;
      if (o.animAccum>=130){ o.animAccum=0; o.anim=(o.anim+1)%FLY_SEQ.length; }
    }
  }
  obstacles = obstacles.filter(o=> (o.type==='fly'? o.x+o.w : o.x+o.totalW) > -20);

  const hb = horseHitbox();
  for (const o of obstacles){
    if (rectHit(hb, obstacleHitbox(o))){ doGameOver(); break; }
  }
}

function horseHitbox(){
  const asset = horse.onGround ? ASSETS[RUN_SEQ[horse.runIdx]] : ASSETS.JUMP;
  const w = wOf(asset, HORSE_H);
  const topY = FEET_Y - HORSE_H - horse.y;
  const pad = 8;
  return { x:horse.x+pad, y:topY+pad, w:w-pad*2, h:HORSE_H-pad*1.6 };
}
function obstacleHitbox(o){
  if (o.type==='fly'){ const p=6; return {x:o.x+p,y:o.y+p,w:o.w-p*2,h:o.h-p*2}; }
  const p=5; return {x:o.x+p,y:o.y+p,w:o.totalW-p*2,h:FIRE_H-p};
}
function rectHit(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

function doGameOver(){
  gameOver = true;
  const runScore = Math.floor(score);
  if (!cleared){
    totalScore += runScore;
    localStorage.setItem('run2026_total', totalScore);
  } else {
    if (runScore > best){ best = runScore; localStorage.setItem('run2026_best', best); }
  }
  retryBtn.style.display = 'flex';
}

// ---------- Render ----------
function drawGround(){
  let x = groundX;
  while (x < CW){
    ctx.drawImage(IMG.GROUND, x, GROUND_TOP, GROUND_W, GROUND_H);
    x += GROUND_W;
  }
}
function drawHorse(){
  const key = horse.onGround ? RUN_SEQ[horse.runIdx] : 'JUMP';
  const asset = ASSETS[key];
  const w = wOf(asset, HORSE_H);
  const y = FEET_Y - HORSE_H - horse.y;
  ctx.drawImage(IMG[key], horse.x, y, w, HORSE_H);
}
function drawObstacles(){
  for (const o of obstacles){
    if (o.type==='fly'){
      ctx.drawImage(IMG[FLY_SEQ[o.anim]], o.x, o.y, o.w, o.h);
    } else {
      for (let i=0;i<o.count;i++){
        ctx.drawImage(IMG.FIRE, o.x + i*(FIRE_W+o.gap), o.y, FIRE_W, FIRE_H);
      }
    }
  }
}
function drawScore(){
  ctx.fillStyle = '#777';
  ctx.font = '16px "Press Start 2P", monospace';
  ctx.textAlign = 'right';
  const s = String(Math.floor(score)).padStart(5,'0');
  const hiVal = cleared ? best : Math.floor(totalScore + score);
  const txt = 'HI ' + String(hiVal).padStart(5,'0') + '   ' + s;
  ctx.fillText(txt, CW-24, 38);
  ctx.textAlign = 'left';
}
const TITLE_TEXT = 'RUN TOWARD 2026';
const TITLE_LETTERS = TITLE_TEXT.replace(/ /g,'').length;   // 13 letters (spaces excluded)
function drawTitle(){
  if (!started && !gameOver && !gameClear){
    // start screen: big red, centered
    ctx.fillStyle = '#E0312B';
    ctx.textAlign = 'center';
    ctx.font = '28px "Press Start 2P", monospace';
    ctx.fillText(TITLE_TEXT, CW/2, CH/2 - 24);
    ctx.textAlign = 'left';
    return;
  }
  // in-game: top-left, same size as score, per-letter red progress
  ctx.font = '16px "Press Start 2P", monospace';
  ctx.textAlign = 'left';
  // progress toward 2026: cumulative before clear; fully red once cleared
  let litCount;
  if (cleared){
    litCount = TITLE_LETTERS;                             // 2026 reached: all red
  } else {
    const progress = Math.min(1, (totalScore + score) / CLEAR_SCORE);
    litCount = Math.floor(progress * TITLE_LETTERS);
  }
  let x = 24;
  let letterIdx = 0;
  for (const ch of TITLE_TEXT){
    if (ch !== ' '){
      ctx.fillStyle = (letterIdx < litCount) ? '#E0312B' : '#777';
      ctx.fillText(ch, x, 38);
      letterIdx++;
    }
    x += ctx.measureText(ch).width;
  }
}
function drawStartText(){
  ctx.fillStyle = '#999';
  ctx.textAlign = 'center';
  ctx.font = '12px "Press Start 2P", monospace';
  ctx.fillText('PRESS SPACE / TAP TO START', CW/2, CH/2 + 18);
  ctx.font = '9px "Press Start 2P", monospace';
  ctx.fillText('JUMP OVER THE FIRE TO REACH 2026', CW/2, CH/2 + 44);
  ctx.textAlign = 'left';
}
function drawGameOver(){
  ctx.textAlign = 'center';
  ctx.fillStyle = '#E0312B';
  ctx.font = '24px "Press Start 2P", monospace';
  ctx.fillText('GAME OVER', CW/2, CH/2 - 20);
  ctx.textAlign = 'left';
}
function drawGameClear(){
  ctx.textAlign = 'center';
  ctx.fillStyle = '#E0312B';
  ctx.font = '26px "Press Start 2P", monospace';
  ctx.fillText('GAME CLEAR', CW/2, CH/2 - 30);
  ctx.fillStyle = '#999';
  ctx.font = '10px "Press Start 2P", monospace';
  ctx.fillText('WELCOME TO 2026', CW/2, CH/2 - 6);
  ctx.textAlign = 'left';
}
function render(){
  ctx.clearRect(0,0,CW,CH);
  drawGround();
  drawObstacles();
  drawHorse();
  drawScore();
  drawTitle();
  if (!started && !gameOver && !gameClear) drawStartText();
  if (gameOver) drawGameOver();
  if (gameClear) drawGameClear();
}

// ---------- Loop ----------
function loop(t){
  if (!lastTime) lastTime = t;
  let dt = t - lastTime; lastTime = t;
  if (dt > 50) dt = 50;
  if (loaded >= totalImgs){
    if (!gameOver && !gameClear) update(dt);
    render();
  } else {
    ctx.clearRect(0,0,CW,CH);
    ctx.fillStyle='#999'; ctx.textAlign='center';
    ctx.font='12px "Press Start 2P", monospace';
    ctx.fillText('LOADING...', CW/2, CH/2);
    ctx.textAlign='left';
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
