<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body {
    height:100%;
    background:#ffffff;
    display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P', monospace;
    overflow:hidden;
    -webkit-user-select:none; user-select:none;
    touch-action:manipulation;
  }
  #stage {
    position:relative;
    width:66.66vw;
    max-width:1100px;
    background:#ffffff;
    image-rendering:pixelated;
  }
  canvas { display:block; width:100%; image-rendering:pixelated; background:#ffffff; }
  #retryBtn {
    position:absolute;
    left:50%;
    top:calc(60% - 15px);
    transform:translate(-50%, 0);
    width:51px; height:42px;
    background:#E0312B;
    border:none;
    cursor:pointer;
    display:none;
    align-items:center; justify-content:center;
    clip-path: polygon(
      0 6px, 3px 6px, 3px 3px, 6px 3px, 6px 0,
      calc(100% - 6px) 0, calc(100% - 6px) 3px, calc(100% - 3px) 3px, calc(100% - 3px) 6px, 100% 6px,
      100% calc(100% - 6px), calc(100% - 3px) calc(100% - 6px), calc(100% - 3px) calc(100% - 3px), calc(100% - 6px) calc(100% - 3px), calc(100% - 6px) 100%,
      6px 100%, 6px calc(100% - 3px), 3px calc(100% - 3px), 3px calc(100% - 6px), 0 calc(100% - 6px)
    );
    transition: transform 0.08s steps(2);
  }
  #retryBtn:hover { transform:translate(-50%, -2px); }
  #retryBtn:active { transform:translate(-50%, 0); }
  #retryBtn svg { width:27px; height:27px; display:block; }
  @media (max-width: 768px), (pointer: coarse) and (max-width: 1024px) {
    #stage { width:100vw; max-width:none; }
    #retryBtn { width:26px; height:21px; }
    #retryBtn svg { width:14px; height:14px; }
  }
</style>

function playBgm(){ bgm.currentTime=0; bgm.play().catch(()=>{}); }
function stopBgm(){ bgm.pause(); bgm.currentTime=0; }
function playSfx(sfx){ sfx.currentTime=0; sfx.play().catch(()=>{}); }

// ---------- Config ----------
const CW=900, CH=300;
const GROUND_OVERLAP=10;
const START_SPEED=6.5, MAX_SPEED=13.5, SPEED_INC=0.0011;
const GRAVITY=0.62;
const CLEAR_SCORE=2026;

const HORSE_H=70;
function wOf(asset,h){ return asset.w*(h/asset.h); }

const FIRE_H=56, FIRE_W=wOf(ASSETS.FIRE,FIRE_H);
const GROUND_H=30, GROUND_W=wOf(ASSETS.GROUND,GROUND_H);
const GROUND_TOP=CH-GROUND_H-18;
const FEET_Y=GROUND_TOP+GROUND_OVERLAP;
const JUMP_PEAK=FIRE_H*2;
const JUMP_V=Math.sqrt(2*GRAVITY*JUMP_PEAK);
const JUMP_AIRTIME=2*JUMP_V/GRAVITY;

// ---------- Load images ----------
const IMG={};
let loaded=0; const totalImgs=Object.keys(ASSETS).length;
for(const k in ASSETS){
  const im=new Image();
  im.onload=()=>{ loaded++; };
  im.src=ASSETS[k].src;
  IMG[k]=im;
}

const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
const retryBtn=document.getElementById('retryBtn');

// ---------- Sequences ----------
const RUN_SEQ=['RUN_1','RUN_2'];
const RUN_FRAME_MS=300;
const FLY_SEQ=['FLY_1','FLY_2','FLY_1','FLY_2'];

// ---------- Score ----------
let cleared=localStorage.getItem('run2026_cleared')==='1';
let totalScore=+(localStorage.getItem('run2026_total')||0);
let best=+(localStorage.getItem('run2026_best')||0);

let speed,score,gameOver,gameClear,started;
let horse,obstacles,spawnTimer,groundX;
let lastTime=0, runAccum=0;

function reset(){
  speed=START_SPEED; score=0;
  gameOver=false; gameClear=false; started=false;
  groundX=0; spawnTimer=60; obstacles=[]; runAccum=0;
  horse={x:80,y:0,vy:0,onGround:true,runIdx:0};
  retryBtn.style.display='none';
  stopBgm();
}
reset();

// ---------- Input ----------
function jump(){
  if(gameOver||gameClear) return;
  if(!started){ started=true; playBgm(); playSfx(sfxStart); }
  if(horse.onGround){ horse.vy=JUMP_V; horse.onGround=false; playSfx(sfxJump); }
}
window.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); jump(); }
});
const stage=document.getElementById('stage');
stage.addEventListener('touchstart', e=>{
  if(e.target===retryBtn||retryBtn.contains(e.target)) return;
  e.preventDefault(); jump();
},{passive:false});
stage.addEventListener('mousedown', e=>{
  if(e.target===retryBtn||retryBtn.contains(e.target)) return;
  e.preventDefault(); jump();
});

function restart(){ reset(); started=true; playBgm(); playSfx(sfxStart); }
retryBtn.addEventListener('click', e=>{ e.stopPropagation(); restart(); });
retryBtn.addEventListener('touchstart', e=>{ e.stopPropagation(); },{passive:true});

// ---------- Spawn ----------
function spawnObstacle(){
  const flying=Math.random()<0.3&&score>180;
  if(flying){
    const h=46,w=wOf(ASSETS.FLY_1,h);
    const fy=[FEET_Y-h-36,FEET_Y-h-70][Math.floor(Math.random()*2)];
    obstacles.push({type:'fly',x:CW+30,y:fy,w,h,anim:0,animAccum:0});
  } else {
    const count=Math.random()<0.45?2:1,gap=4;
    const totalW=count*FIRE_W+(count-1)*gap;
    obstacles.push({type:'fire',x:CW+30,y:FEET_Y-FIRE_H,count,gap,totalW});
  }
}
function nextSpawnDelay(){
  const speedT=(speed-START_SPEED)/(MAX_SPEED-START_SPEED);
  const minGap=JUMP_AIRTIME+12-speedT*4;
  const r=Math.random();
  if(r<0.32) return minGap+Math.random()*10;
  if(r<0.78) return minGap+18+Math.random()*35;
  return minGap+55+Math.random()*55;
}

// ---------- Update ----------
function update(dt){
  if(!started) return;
  speed=Math.min(MAX_SPEED,speed+SPEED_INC*(dt/16.67));
  score+=speed*0.02*(dt/16.67);

  if(!cleared&&totalScore+score>=CLEAR_SCORE){
    gameClear=true; cleared=true; totalScore=0;
    localStorage.setItem('run2026_cleared','1');
    localStorage.setItem('run2026_total','0');
    stopBgm(); playSfx(sfxStart);
    retryBtn.style.display='flex';
    return;
  }

  groundX-=speed;
  if(groundX<=-GROUND_W) groundX+=GROUND_W;

  if(!horse.onGround){
    horse.vy-=GRAVITY*(dt/16.67);
    horse.y+=horse.vy*(dt/16.67);
    if(horse.y<=0){horse.y=0;horse.vy=0;horse.onGround=true;}
  }

  runAccum+=dt;
  if(runAccum>=RUN_FRAME_MS){runAccum-=RUN_FRAME_MS;horse.runIdx=(horse.runIdx+1)%RUN_SEQ.length;}

  spawnTimer-=dt/16.67;
  if(spawnTimer<=0){spawnObstacle();spawnTimer=nextSpawnDelay();}

  for(const o of obstacles){
    o.x-=speed;
    if(o.type==='fly'){o.animAccum+=dt;if(o.animAccum>=130){o.animAccum=0;o.anim=(o.anim+1)%FLY_SEQ.length;}}
  }
  obstacles=obstacles.filter(o=>(o.type==='fly'?o.x+o.w:o.x+o.totalW)>-20);

  const hb=horseHitbox();
  for(const o of obstacles){if(rectHit(hb,obstacleHitbox(o))){doGameOver();break;}}
}

function horseHitbox(){
  const asset=horse.onGround?ASSETS[RUN_SEQ[horse.runIdx]]:ASSETS.JUMP;
  const w=wOf(asset,HORSE_H),topY=FEET_Y-HORSE_H-horse.y,pad=8;
  return{x:horse.x+pad,y:topY+pad,w:w-pad*2,h:HORSE_H-pad*1.6};
}
function obstacleHitbox(o){
  if(o.type==='fly'){const p=6;return{x:o.x+p,y:o.y+p,w:o.w-p*2,h:o.h-p*2};}
  const p=5;return{x:o.x+p,y:o.y+p,w:o.totalW-p*2,h:FIRE_H-p};
}
function rectHit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

function doGameOver(){
  gameOver=true;
  const runScore=Math.floor(score);
  if(!cleared){totalScore+=runScore;localStorage.setItem('run2026_total',totalScore);}
  else{if(runScore>best){best=runScore;localStorage.setItem('run2026_best',best);}}
  stopBgm(); playSfx(sfxDie);
  retryBtn.style.display='flex';
}

// ---------- Render ----------
function drawGround(){
  let x=groundX;
  while(x<CW){ctx.drawImage(IMG.GROUND,x,GROUND_TOP,GROUND_W,GROUND_H);x+=GROUND_W;}
}
function drawHorse(){
  const key=horse.onGround?RUN_SEQ[horse.runIdx]:'JUMP';
  const w=wOf(ASSETS[key],HORSE_H),y=FEET_Y-HORSE_H-horse.y;
  ctx.drawImage(IMG[key],horse.x,y,w,HORSE_H);
}
function drawObstacles(){
  for(const o of obstacles){
    if(o.type==='fly'){ctx.drawImage(IMG[FLY_SEQ[o.anim]],o.x,o.y,o.w,o.h);}
    else{for(let i=0;i<o.count;i++) ctx.drawImage(IMG.FIRE,o.x+i*(FIRE_W+o.gap),o.y,FIRE_W,FIRE_H);}
  }
}
function drawScore(){
  ctx.fillStyle='#777';ctx.font='16px "Press Start 2P", monospace';ctx.textAlign='right';
  const s=String(Math.floor(score)).padStart(5,'0');
  const hiVal=cleared?best:Math.floor(totalScore+score);
  ctx.fillText('HI '+String(hiVal).padStart(5,'0')+'   '+s,CW-24,38);
  ctx.textAlign='left';
}
const TITLE_TEXT='RUN TOWARD 2026';
const TITLE_LETTERS=TITLE_TEXT.replace(/ /g,'').length;
function drawTitle(){
  if(!started&&!gameOver&&!gameClear){
    ctx.fillStyle='#E0312B';ctx.textAlign='center';
    ctx.font='28px "Press Start 2P", monospace';
    ctx.fillText(TITLE_TEXT,CW/2,CH/2-24);ctx.textAlign='left';return;
  }
  ctx.font='16px "Press Start 2P", monospace';ctx.textAlign='left';
  const litCount=cleared?TITLE_LETTERS:Math.floor(Math.min(1,(totalScore+score)/CLEAR_SCORE)*TITLE_LETTERS);
  let x=24,li=0;
  for(const ch of TITLE_TEXT){
    if(ch!==' '){ctx.fillStyle=li<litCount?'#E0312B':'#777';ctx.fillText(ch,x,38);li++;}
    x+=ctx.measureText(ch).width;
  }
}
function drawStartText(){
  ctx.fillStyle='#999';ctx.textAlign='center';
  ctx.font='12px "Press Start 2P", monospace';
  ctx.fillText('PRESS SPACE / TAP TO START',CW/2,CH/2+18);
  ctx.font='9px "Press Start 2P", monospace';
  ctx.fillText('JUMP OVER THE FIRE TO REACH 2026',CW/2,CH/2+44);
  ctx.textAlign='left';
}
function drawGameOver(){
  ctx.textAlign='center';ctx.fillStyle='#E0312B';
  ctx.font='24px "Press Start 2P", monospace';
  ctx.fillText('GAME OVER',CW/2,CH/2-20);ctx.textAlign='left';
}
function drawGameClear(){
  ctx.textAlign='center';ctx.fillStyle='#E0312B';
  ctx.font='26px "Press Start 2P", monospace';
  ctx.fillText('GAME CLEAR',CW/2,CH/2-30);
  ctx.fillStyle='#999';ctx.font='10px "Press Start 2P", monospace';
  ctx.fillText('WELCOME TO 2026',CW/2,CH/2-6);ctx.textAlign='left';
}
function render(){
  ctx.clearRect(0,0,CW,CH);
  drawGround();drawObstacles();drawHorse();drawScore();drawTitle();
  if(!started&&!gameOver&&!gameClear) drawStartText();
  if(gameOver) drawGameOver();
  if(gameClear) drawGameClear();
}

// ---------- Loop ----------
function loop(t){
  if(!lastTime) lastTime=t;
  let dt=t-lastTime;lastTime=t;if(dt>50)dt=50;
  if(loaded>=totalImgs){if(!gameOver&&!gameClear)update(dt);render();}
  else{
    ctx.clearRect(0,0,CW,CH);ctx.fillStyle='#999';ctx.textAlign='center';
    ctx.font='12px "Press Start 2P", monospace';
    ctx.fillText('LOADING...',CW/2,CH/2);ctx.textAlign='left';
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
